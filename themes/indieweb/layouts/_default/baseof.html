<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang | default "en" }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="shell">
    <div class="container">
      {{ partial "masthead.html" . }}
      <main id="main">
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" . }}
    </div>
  </div>
  <script src="{{ "js/theme.js" | relURL }}" defer></script>
</body>
</html>
